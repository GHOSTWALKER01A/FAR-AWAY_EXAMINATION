services:
  # Postgres is now provided by Supabase — no local container needed.
  # Update DATABASE_URL and DIRECT_URL in apps/core-api/.env with your
  # Supabase project connection strings before starting.

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  core-api:
    build: ./apps/core-api
    env_file: ./apps/core-api/.env
    environment:
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    ports: ["3000:3000"]
    depends_on:
      redis: { condition: service_healthy }
    # migrate deploy uses DIRECT_URL (set in apps/core-api/.env)
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

  ai-svc:
    build: ./apps/ai-svc
    env_file: ./apps/ai-svc/.env
    environment:
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports: ["8000:8000"]
    depends_on:
      redis: { condition: service_healthy }

volumes:
  redisdata:
